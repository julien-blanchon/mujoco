# Build Python wheels with experimental filament rendering support.
# Builds for Linux x86_64 and macOS arm64, Python 3.10-3.13,
# then creates a GitHub release.
# Note: Windows excluded (upstream MSVC linker bug with anonymous structs),
# macOS x86_64 excluded (no free Intel macOS runners available).

name: build-filament-wheels

on:
  push:
    branches:
      - exp-filament-build
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (clang-18, Ubuntu 24.04)
          - os: ubuntu-24.04
            label: linux-x86_64
            python-version: "3.10"
            cmake_args: >-
              -G Ninja
              -DCMAKE_C_COMPILER:STRING=clang-18
              -DCMAKE_CXX_COMPILER:STRING=clang++-18
            tmpdir: "/tmp"
          - os: ubuntu-24.04
            label: linux-x86_64
            python-version: "3.11"
            cmake_args: >-
              -G Ninja
              -DCMAKE_C_COMPILER:STRING=clang-18
              -DCMAKE_CXX_COMPILER:STRING=clang++-18
            tmpdir: "/tmp"
          - os: ubuntu-24.04
            label: linux-x86_64
            python-version: "3.12"
            cmake_args: >-
              -G Ninja
              -DCMAKE_C_COMPILER:STRING=clang-18
              -DCMAKE_CXX_COMPILER:STRING=clang++-18
            tmpdir: "/tmp"
          - os: ubuntu-24.04
            label: linux-x86_64
            python-version: "3.13"
            cmake_args: >-
              -G Ninja
              -DCMAKE_C_COMPILER:STRING=clang-18
              -DCMAKE_CXX_COMPILER:STRING=clang++-18
            tmpdir: "/tmp"

          # macOS arm64
          - os: macos-15
            label: macos-arm64
            python-version: "3.10"
            cmake_args: >-
              -G Ninja
              -DCMAKE_CXX_FLAGS="-Wno-error=deprecated-declarations"
            tmpdir: "/tmp"
          - os: macos-15
            label: macos-arm64
            python-version: "3.11"
            cmake_args: >-
              -G Ninja
              -DCMAKE_CXX_FLAGS="-Wno-error=deprecated-declarations"
            tmpdir: "/tmp"
          - os: macos-15
            label: macos-arm64
            python-version: "3.12"
            cmake_args: >-
              -G Ninja
              -DCMAKE_CXX_FLAGS="-Wno-error=deprecated-declarations"
            tmpdir: "/tmp"
          - os: macos-15
            label: macos-arm64
            python-version: "3.13"
            cmake_args: >-
              -G Ninja
              -DCMAKE_CXX_FLAGS="-Wno-error=deprecated-declarations"
            tmpdir: "/tmp"

    name: "${{ matrix.label }}-py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Prepare Linux
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update && sudo apt-get install -y \
          libgl1-mesa-dev \
          libwayland-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxkbcommon-dev \
          libxrandr-dev \
          libxi-dev \
          ninja-build \
          patchelf

    - name: Prepare macOS
      if: runner.os == 'macOS'
      run: brew install ninja

    - uses: actions/setup-python@v5
      with:
        python-version: "${{ matrix.python-version }}"

    - name: Prepare Python
      shell: bash
      env:
        TMPDIR: ${{ matrix.tmpdir }}
      run: bash ./.github/workflows/build_steps.sh prepare_python

    # Build core MuJoCo with filament support (mirrors configure_studio flags
    # which properly pull in SDL2 via the platform target)
    - name: Configure MuJoCo (with filament)
      shell: bash
      env:
        TMPDIR: ${{ matrix.tmpdir }}
        CMAKE_ARGS: ${{ matrix.cmake_args }}
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE:STRING=Release \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION:BOOL=OFF \
          -DCMAKE_INSTALL_PREFIX:STRING=${TMPDIR}/mujoco_install \
          -DUSE_STATIC_LIBCXX=OFF \
          -DBUILD_SHARED_LIBS=OFF \
          -DMUJOCO_BUILD_EXAMPLES=OFF \
          -DMUJOCO_BUILD_SIMULATE=OFF \
          -DMUJOCO_BUILD_STUDIO=ON \
          -DMUJOCO_BUILD_TESTS=OFF \
          -DMUJOCO_TEST_PYTHON_UTIL=OFF \
          -DMUJOCO_WITH_USD=OFF \
          -DMUJOCO_USE_FILAMENT=ON \
          ${CMAKE_ARGS}

    - name: Build MuJoCo
      shell: bash
      working-directory: build
      run: cmake --build . --config=Release

    - name: Install MuJoCo
      shell: bash
      working-directory: build
      run: cmake --install . --config=Release

    - name: Copy plugins
      shell: bash
      working-directory: build
      env:
        TMPDIR: ${{ matrix.tmpdir }}
      run: |
        mkdir -p ${TMPDIR}/mujoco_install/mujoco_plugin
        cp lib/libactuator.* ${TMPDIR}/mujoco_install/mujoco_plugin || true
        cp lib/libelasticity.* ${TMPDIR}/mujoco_install/mujoco_plugin || true
        cp lib/libsensor.* ${TMPDIR}/mujoco_install/mujoco_plugin || true
        cp lib/libsdf_plugin.* ${TMPDIR}/mujoco_install/mujoco_plugin || true

    - name: Make Python sdist
      shell: bash
      working-directory: python
      env:
        TMPDIR: ${{ matrix.tmpdir }}
      run: bash ../.github/workflows/build_steps.sh make_python_sdist

    - name: Build Python wheel
      shell: bash
      working-directory: python/dist
      env:
        TMPDIR: ${{ matrix.tmpdir }}
        CMAKE_ARGS: ${{ matrix.cmake_args }}
      run: |
        source ${TMPDIR}/venv/bin/activate
        MUJOCO_PATH="${TMPDIR}/mujoco_install" \
        MUJOCO_PLUGIN_PATH="${TMPDIR}/mujoco_install/mujoco_plugin" \
        MUJOCO_CMAKE_ARGS="-DCMAKE_INTERPROCEDURAL_OPTIMIZATION:BOOL=OFF ${CMAKE_ARGS}" \
        pip wheel -v --no-deps mujoco-*.tar.gz

    - name: Repair wheel (Linux)
      if: runner.os == 'Linux'
      shell: bash
      working-directory: python/dist
      env:
        TMPDIR: ${{ matrix.tmpdir }}
      run: |
        source ${TMPDIR}/venv/bin/activate
        pip install auditwheel
        auditwheel repair --plat manylinux_2_39_x86_64 -w wheelhouse mujoco-*.whl || \
          (mkdir -p wheelhouse && cp mujoco-*.whl wheelhouse/)

    - name: Repair wheel (macOS)
      if: runner.os == 'macOS'
      shell: bash
      working-directory: python/dist
      env:
        TMPDIR: ${{ matrix.tmpdir }}
      run: |
        source ${TMPDIR}/venv/bin/activate
        pip install delocate
        delocate-wheel -v -w wheelhouse mujoco-*.whl || \
          (mkdir -p wheelhouse && cp mujoco-*.whl wheelhouse/)

    - name: Upload wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: wheel-${{ matrix.label }}-py${{ matrix.python-version }}
        path: python/dist/wheelhouse/*.whl

  release:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all wheel artifacts
      uses: actions/download-artifact@v4
      with:
        path: wheels
        pattern: wheel-*
        merge-multiple: true

    - name: List wheels
      run: ls -la wheels/

    - name: Get version
      id: version
      run: |
        version=$(grep 'version' python/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "MuJoCo version: ${version}"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.version.outputs.version }}-filament"
        name: "MuJoCo ${{ steps.version.outputs.version }} (Experimental Filament)"
        body: |
          Experimental build of MuJoCo ${{ steps.version.outputs.version }} with filament rendering support enabled.

          Built with `-DMUJOCO_USE_FILAMENT=ON`.

          ## Install

          Download the appropriate wheel for your platform and Python version, then:
          ```bash
          pip install mujoco-*.whl
          ```

          ## Platforms
          - Linux x86_64 (Ubuntu 24.04)
          - macOS arm64

          ## Python versions
          - 3.10, 3.11, 3.12, 3.13
        files: wheels/*.whl
        draft: false
        prerelease: true
        generate_release_notes: false
